<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClockBot — WhatsApp Auto Clock-In/Out</title>
  <meta name="description" content="Automate your daily WhatsApp clock-in and clock-out messages with ClockBot.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
            surface: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    .glass { background: rgba(30,41,59,.65); backdrop-filter: blur(16px); border: 1px solid rgba(99,102,241,.15); }
    .glass-light { background: rgba(30,41,59,.4); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.06); }
    .glow { box-shadow: 0 0 30px -5px rgba(99,102,241,.25); }
    .glow-sm { box-shadow: 0 0 15px -3px rgba(99,102,241,.2); }
    .btn-primary { background: linear-gradient(135deg,#6366f1,#4f46e5); transition: all .2s; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px -5px rgba(99,102,241,.4); }
    .btn-danger { background: linear-gradient(135deg,#ef4444,#dc2626); }
    .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 8px 25px -5px rgba(239,68,68,.4); }
    .btn-warning { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .btn-warning:hover { transform: translateY(-1px); box-shadow: 0 8px 25px -5px rgba(245,158,11,.4); }
    .sidebar-item { transition: all .2s; border-left: 3px solid transparent; }
    .sidebar-item:hover, .sidebar-item.active { background: rgba(99,102,241,.12); border-left-color: #6366f1; color: #a5b4fc; }
    .badge { padding: 2px 10px; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
    .badge-green { background: rgba(34,197,94,.15); color: #4ade80; }
    .badge-red { background: rgba(239,68,68,.15); color: #f87171; }
    .badge-yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
    .badge-blue { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-gray { background: rgba(148,163,184,.15); color: #94a3b8; }
    .fade-in { animation: fadeIn .3s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:.4; } }
    .pulse-dot { animation: pulse-dot 2s infinite; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .table-row { transition: background .15s; }
    .table-row:hover { background: rgba(99,102,241,.06); }
  </style>
</head>
<body class="min-h-screen">
  <div id="app"></div>
  <script src="core.js?v=2.0.0"></script>
  <script src="dashboard.js?v=2.0.0"></script>
  <script src="schedule.js?v=2.0.0"></script>
  <script src="logs.js?v=2.0.0"></script>
  <script src="admin.js?v=2.0.0"></script>
  <script src="init.js?v=2.0.0"></script>
</body>
</html>
